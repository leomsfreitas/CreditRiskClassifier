name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  test-and-evaluate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v

      - name: Train and evaluate model
        run: python src/train.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-results
          path: |
            reports/metrics.json
            reports/full_report.json
            models/model.joblib

      - name: Get main branch metrics
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-branch

      - name: Train main branch model
        if: github.event_name == 'pull_request'
        run: |
          cd main-branch
          pip install -e ".[dev]"
          python src/train.py

      - name: Comment PR with metrics comparison
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");

            const pr   = JSON.parse(fs.readFileSync("reports/metrics.json"));
            const main = JSON.parse(fs.readFileSync("main-branch/reports/metrics.json"));

            const emoji = (pr, main) => pr >= main ? "✅" : "❌";
            const fmt   = (v) => (v * 100).toFixed(2) + "%";

            const body = `
            ## Model Comparison

            | Metric    | main                  | PR                    |        |
            |-----------|-----------------------|-----------------------|--------|
            | Accuracy  | ${fmt(main.accuracy)} | ${fmt(pr.accuracy)}   | ${emoji(pr.accuracy, main.accuracy)} |
            | F1        | ${fmt(main.f1)}       | ${fmt(pr.f1)}         | ${emoji(pr.f1, main.f1)} |
            | Precision | ${fmt(main.precision)}| ${fmt(pr.precision)}  | ${emoji(pr.precision, main.precision)} |
            | Recall    | ${fmt(main.recall)}   | ${fmt(pr.recall)}     | ${emoji(pr.recall, main.recall)} |
            `;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });